<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garabato Store — Próximamente</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #fff7e6 0%, #ffe9c7 60%, #f5d199 100%);
        color: #2a1d0c;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 520px;
        padding: 3rem 2.5rem;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        box-shadow: 0 20px 60px -20px rgba(0,0,0,0.2);
      }
      h1 { font-size: clamp(2rem, 6vw, 3rem); margin: 0 0 .5rem; letter-spacing: -.02em; }
      p { margin: .25rem 0; opacity: .75; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d97706; margin-right: .5rem; animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Garabato Store</h1>
      <p><span class="dot"></span>Sitio en construcción</p>
      <p style="margin-top: 1.5rem; font-size: .9rem;">Pronto, algo bonito por aquí.</p>
    </main>
  </body>
</html>
